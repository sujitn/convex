name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.VERSION }}
      tag: ${{ steps.tag.outputs.TAG }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Get tag version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ steps.tag.outputs.VERSION }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Cargo.toml version ($CARGO_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $CARGO_VERSION"

      - name: Run tests
        run: cargo test --all-features --workspace

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-features --workspace -- -D warnings

      - name: Build documentation
        run: cargo doc --no-deps --all-features --workspace

  build-excel-addin:
    name: Build Excel Add-in
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build convex-ffi
        run: cargo build --release -p convex-ffi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Excel Add-in
        run: dotnet build excel/Convex.Excel/Convex.Excel.csproj --configuration Release

      - name: Copy native DLL
        run: copy target\release\convex_ffi.dll excel\Convex.Excel\bin\Release\net472\

      - name: Create Add-in Package
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          New-Item -ItemType Directory -Force -Path convex-excel-addin | Out-Null
          Copy-Item excel\Convex.Excel\bin\Release\net472\Convex.Excel64.xll convex-excel-addin\
          Copy-Item excel\Convex.Excel\bin\Release\net472\Convex.Excel64.dna convex-excel-addin\
          Copy-Item excel\Convex.Excel\bin\Release\net472\Convex.Excel.dll convex-excel-addin\
          Copy-Item excel\Convex.Excel\bin\Release\net472\convex_ffi.dll convex-excel-addin\
          if (Test-Path excel\ConvexDemo.xlsx) { Copy-Item excel\ConvexDemo.xlsx convex-excel-addin\ }
          "Convex Excel Add-in - Extract and load Convex.Excel64.xll in Excel" | Out-File convex-excel-addin\README.txt
          Compress-Archive -Path convex-excel-addin\* -DestinationPath "convex-excel-addin-v$version.zip"

      - name: Upload Add-in Artifact
        uses: actions/upload-artifact@v7
        with:
          name: convex-excel-addin
          path: convex-excel-addin-v*.zip
          retention-days: 5

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      # Publish the five library crates in dependency order. cargo publish
      # waits for each version to land in the index before returning, so the
      # next crate can resolve it. The remaining workspace crates are
      # publish = false and are skipped automatically.
      #
      # crates.io versions are immutable, so a crate already at this version is
      # skipped (HTTP 200 from the per-version API) rather than erroring. This
      # makes the job safe to re-run after a mid-list failure.
      - name: Publish library crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          ua="convex-release (https://github.com/sujitn/convex)"
          for crate in convex-core convex-math convex-curves convex-bonds convex-analytics; do
            status=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "User-Agent: $ua" \
              "https://crates.io/api/v1/crates/$crate/$VERSION")
            if [ "$status" = "200" ]; then
              echo "✓ $crate@$VERSION already on crates.io — skipping"
              continue
            elif [ "$status" != "404" ]; then
              echo "Unexpected HTTP $status checking $crate@$VERSION on crates.io" >&2
              exit 1
            fi
            echo "::group::cargo publish -p $crate ($VERSION)"
            cargo publish -p "$crate"
            echo "::endgroup::"
          done

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-excel-addin, publish-crates]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download Excel Add-in
        uses: actions/download-artifact@v8.0.1
        with:
          name: convex-excel-addin
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: v${{ needs.validate.outputs.version }}
          body: |
            ## Installation

            The core library crates are published to crates.io. Depend on the
            unified analytics crate (it pulls in core, math, curves and bonds):

            ```toml
            convex-analytics = "${{ needs.validate.outputs.version }}"
            ```

            Individually published crates: `convex-core`, `convex-math`,
            `convex-curves`, `convex-bonds`, `convex-analytics`. The `convex`
            umbrella plus the FFI / WASM / MCP / server crates are internal —
            consume them via a git or path dependency.

            ### Excel Add-in
            Download the `convex-excel-addin` zip from assets below, extract,
            and load `Convex.Excel64.xll` in Excel.
          files: ./artifacts/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
