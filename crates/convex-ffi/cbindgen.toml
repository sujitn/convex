# cbindgen configuration for the Convex C ABI.
#
# The generated header documents the C surface for non-JVM consumers (the Java
# binding uses Panama FFM and binds by symbol name, so it does not need this
# header). Regenerate the committed reference copy with:
#
#   cbindgen --config crates/convex-ffi/cbindgen.toml \
#            --crate convex-ffi \
#            --output bindings/java/native-headers/convex.h

language = "C"
header = "/* Convex C ABI — generated by cbindgen. Do not edit by hand. */"
include_guard = "CONVEX_FFI_H"
tab_width = 4
documentation = true
documentation_style = "doxy"
cpp_compat = true

[export]
prefix = ""

[parse]
parse_deps = false

[fn]
sort_by = "None"
